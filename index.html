<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>kobo</title>

  <!-- Google Fonts: Cormorant Garamond (headings) + Urbanist (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Urbanist:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- NAVBAR COMPONENT -->
<div id="navbar"></div>

  <!-- NAVBAR: transparent on hero, turns white on scroll -->

  <!-- FOOTER COMPONENT -->
  <div id="footer"></div>

  <script>
    fetch('navbar.html')
      .then(res => res.text())
      .then(html => {
        document.getElementById('navbar').innerHTML = html;
        const navbar = document.querySelector('.navbar');
        window.addEventListener('scroll', () => {
          navbar.classList.toggle('scrolled', window.scrollY > 50);
        });
      });
  </script>

  <script>
    fetch('footer.html')
      .then(res => res.text())
      .then(html => {
        document.getElementById('footer').innerHTML = html;
      });
  </script>

</body>
</html>
