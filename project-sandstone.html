<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Sandstone Residence — Harrington</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Urbanist:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- NAVBAR COMPONENT -->
  <div id="navbar"></div>

  <main>

    <section class="project-hero">
      <img src="https://picsum.photos/1600/900?random=70" alt="The Sandstone Residence">
      <div class="project-hero__content">
        <h1 class="project-hero__title">The Sandstone Residence</h1>
        <p class="project-hero__location">New York City</p>
      </div>
    </section>

    <div class="project-layout">

      <aside class="project-sidebar">
        <p class="project-sidebar__label">Contents</p>
        <div class="project-sidebar__list">
          <a href="#living" class="project-sidebar__item">
            <span class="project-sidebar__num">01</span>
            <span class="project-sidebar__name">Living Room</span>
          </a>
          <a href="#kitchen" class="project-sidebar__item">
            <span class="project-sidebar__num">02</span>
            <span class="project-sidebar__name">Kitchen</span>
          </a>
          <a href="#dining" class="project-sidebar__item">
            <span class="project-sidebar__num">03</span>
            <span class="project-sidebar__name">Dining Room</span>
          </a>
          <a href="#bedroom" class="project-sidebar__item">
            <span class="project-sidebar__num">04</span>
            <span class="project-sidebar__name">Master Bedroom</span>
          </a>
          <a href="#bathroom" class="project-sidebar__item">
            <span class="project-sidebar__num">05</span>
            <span class="project-sidebar__name">Bathroom</span>
          </a>
          <a href="#outdoor" class="project-sidebar__item">
            <span class="project-sidebar__num">06</span>
            <span class="project-sidebar__name">Outdoor</span>
          </a>

        </div>
      </aside>

      <div class="project-main">

        <div class="project-section" id="living">
          <p class="project-index__num">01</p>
          <h2 class="project-section__title">Living Room</h2>
          <img src="https://picsum.photos/900/600?random=70" alt="Living Room" style="width:100%; margin-top: 24px;">
        </div>

        <div class="project-section" id="kitchen">
          <p class="project-index__num">02</p>
          <h2 class="project-section__title">Kitchen</h2>
          <img src="https://picsum.photos/900/600?random=71" alt="Kitchen" style="width:100%; margin-top: 24px;">
        </div>

        <div class="project-section" id="dining">
          <p class="project-index__num">03</p>
          <h2 class="project-section__title">Dining Room</h2>
          <img src="https://picsum.photos/900/600?random=72" alt="Dining Room" style="width:100%; margin-top: 24px;">
        </div>

        <div class="project-section" id="bedroom">
          <p class="project-index__num">04</p>
          <h2 class="project-section__title">Master Bedroom</h2>
          <img src="https://picsum.photos/900/600?random=73" alt="Master Bedroom" style="width:100%; margin-top: 24px;">
        </div>

        <div class="project-section" id="bathroom">
          <p class="project-index__num">05</p>
          <h2 class="project-section__title">Bathroom</h2>
          <img src="https://picsum.photos/900/600?random=74" alt="Bathroom" style="width:100%; margin-top: 24px;">
        </div>

        <div class="project-section" id="outdoor">
          <p class="project-index__num">06</p>
          <h2 class="project-section__title">Outdoor</h2>
          <img src="https://picsum.photos/900/600?random=75" alt="Outdoor" style="width:100%; margin-top: 24px;">
        </div>

      </div>

    </div>

  </main>

  <!-- FOOTER COMPONENT -->
  <div id="footer"></div>

  <script>
    fetch('navbar.html')
      .then(res => res.text())
      .then(html => {
        document.getElementById('navbar').innerHTML = html;
        const navbar = document.querySelector('.navbar');
        window.addEventListener('scroll', () => {
          navbar.classList.toggle('scrolled', window.scrollY > 200);
        });
        const hamburger = document.querySelector('.navbar__hamburger');
        const mobileMenu = document.querySelector('.navbar__mobile-menu');
        if (hamburger && mobileMenu) {
          hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('open');
            mobileMenu.classList.toggle('open');
            document.body.style.overflow = mobileMenu.classList.contains('open') ? 'hidden' : '';
          });
          document.querySelectorAll('.navbar__mobile-menu a').forEach(link => {
            link.addEventListener('click', () => {
              hamburger.classList.remove('open');
              mobileMenu.classList.remove('open');
              document.body.style.overflow = '';
            });
          });
        }
      });
  </script>

  <script>
    fetch('footer.html')
      .then(res => res.text())
      .then(html => {
        document.getElementById('footer').innerHTML = html;
      });
  </script>

</body>
</html>
