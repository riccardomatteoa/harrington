<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Harrington</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Urbanist:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- NAVBAR COMPONENT -->
  <div id="navbar"></div>

  <main>
    <section class="error-page">
      <div class="error-page__content">
        <p class="error-page__code">404</p>
        <h1 class="error-page__title">Page not found</h1>
        <p class="error-page__text">The page you are looking for does not exist or has been moved.</p>
        <a href="index.html" class="btn">Back to home</a>
      </div>
    </section>
  </main>

  <!-- FOOTER COMPONENT -->
  <div id="footer"></div>

  <script>
    fetch('navbar.html')
      .then(res => res.text())
      .then(html => {
        document.getElementById('navbar').innerHTML = html;
        const navbar = document.querySelector('.navbar');
        navbar.classList.add('scrolled');
        window.addEventListener('scroll', () => navbar.classList.add('scrolled'));

        const hamburger = document.querySelector('.navbar__hamburger');
        const mobileMenu = document.querySelector('.navbar__mobile-menu');
        if (hamburger && mobileMenu) {
          hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('open');
            mobileMenu.classList.toggle('open');
            document.body.style.overflow = mobileMenu.classList.contains('open') ? 'hidden' : '';
          });
          document.querySelectorAll('.navbar__mobile-menu a').forEach(link => {
            link.addEventListener('click', () => {
              hamburger.classList.remove('open');
              mobileMenu.classList.remove('open');
              document.body.style.overflow = '';
            });
          });
        }
      });
  </script>

  <script>
    fetch('footer.html')
      .then(res => res.text())
      .then(html => {
        document.getElementById('footer').innerHTML = html;
      });
  </script>

</body>
</html>
